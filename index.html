        setCart(prev => {
          const existing = prev.find(item => item.id === product.id && item.selectedSize === size);
          if (existing) return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
          return [...prev, { ...product, selectedSize: size, qty: 1 }];
        });
      };
      const updateQty = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = Math.max(1, item.qty + delta);
            return { ...item, qty: newQty };
          }
          return item;
        }));

                                <option value="Confirmed">Confirmed</option>
                                <option value="Shipped">Shipped</option>
                                <option value="Delivered">Delivered (COD Collected)</option>
                                <option value="Cancelled">Cancelled</option>
                              </select>
                            </td>
                          </tr>
                        ))}
                        {orders.length === 0 && (
                          <tr><td colSpan="5" className="p-8 text-center text-zinc-500">No orders found.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {adminTab === 'inventory' && (
                 <div>
                  <h2 className="text-xl font-bold uppercase tracking-widest mb-6">Inventory</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {MOCK_PRODUCTS.map(p => (
                      <div key={p.id} className="flex gap-4 p-4 border border-zinc-800 bg-zinc-900/30 items-center">
                        <img src={p.image} className="w-16 h-16 object-cover" />
                        <div className="flex-1">
                          <h4 className="text-sm font-bold">{p.name}</h4>
                          <p className="text-xs text-zinc-500 mt-1">Price: ₹{p.price} | Stock: <span className={p.stock < 10 ? 'text-red-500' : 'text-green-500'}>{p.stock} units</span></p>
                        </div>
                        <Button variant="secondary" className="!w-auto !py-2 !px-4 !text-xs">Edit</Button>
                      </div>
                    ))}
                  </div>
                 </div>
              )}
              
              {adminTab === 'reports' && (
                 <div className="flex flex-col items-center justify-center py-20 text-zinc-500">
                   <BarChart3 size={64} className="mb-4 opacity-20" />
                   <p className="uppercase tracking-widest text-sm">Detailed Reports Coming Soon</p>
                 </div>
              )}

            </div>
          </div>
        );
      };

      // --- NAVIGATION BAR (CUSTOMER) ---
      const BottomNav = () => (
        <div className="fixed bottom-0 left-0 right-0 h-16 bg-zinc-950/80 backdrop-blur-xl border-t border-zinc-900 flex justify-around items-center z-40 px-2 md:hidden">
          <button onClick={() => setView('home')} className={`p-2 flex flex-col items-center transition-colors ${view === 'home' ? 'text-white' : 'text-zinc-600'}`}>
            <Package size={20} className={view === 'home' ? 'fill-white/10' : ''} />
            <span className="text-[10px] uppercase tracking-wider mt-1 font-bold">Home</span>
          </button>
          <button onClick={() => setView('shop')} className={`p-2 flex flex-col items-center transition-colors ${view === 'shop' ? 'text-white' : 'text-zinc-600'}`}>
            <Search size={20} />
            <span className="text-[10px] uppercase tracking-wider mt-1 font-bold">Shop</span>
          </button>
          <button onClick={() => setView('cart')} className={`p-2 flex flex-col items-center transition-colors relative ${view === 'cart' ? 'text-white' : 'text-zinc-600'}`}>
            <div className="relative">
              <ShoppingBag size={20} className={view === 'cart' ? 'fill-white/10' : ''} />
              {cart.length > 0 && <span className="absolute -top-1 -right-2 bg-white text-zinc-950 text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full">{cart.length}</span>}
            </div>
            <span className="text-[10px] uppercase tracking-wider mt-1 font-bold">Bag</span>
          </button>
          <button onClick={() => setView('profile')} className={`p-2 flex flex-col items-center transition-colors ${view === 'profile' ? 'text-white' : 'text-zinc-600'}`}>
            <User size={20} className={view === 'profile' ? 'fill-white/10' : ''} />
            <span className="text-[10px] uppercase tracking-wider mt-1 font-bold">Profile</span>
          </button>
        </div>
      );

      const TopNav = () => (
        <div className="fixed top-0 left-0 right-0 h-16 bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-900 flex justify-between items-center z-40 px-6 hidden md:flex">
          <h1 onClick={() => setView('home')} className="text-xl font-black uppercase tracking-tighter cursor-pointer">Osaid's App</h1>
          <div className="flex gap-8">
            <button onClick={() => setView('home')} className={`text-sm uppercase tracking-widest font-bold ${view === 'home' ? 'text-white' : 'text-zinc-500 hover:text-white'}`}>Home</button>
            <button onClick={() => setView('shop')} className={`text-sm uppercase tracking-widest font-bold ${view === 'shop' ? 'text-white' : 'text-zinc-500 hover:text-white'}`}>Catalog</button>
          </div>
          <div className="flex gap-6 items-center">
            <button onClick={() => setView('shop')} className="text-zinc-400 hover:text-white"><Search size={20}/></button>
            <button onClick={() => setView('cart')} className="text-zinc-400 hover:text-white relative">
              <ShoppingBag size={20}/>
              {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-white text-zinc-950 text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full">{cart.length}</span>}
            </button>
            <button onClick={() => setView('profile')} className="text-zinc-400 hover:text-white"><User size={20}/></button>
          </div>
        </div>
      );

      // --- RENDER LOGIC ---
      if (view === 'admin') return <AdminView />;

      return (
        <div className="bg-zinc-950 min-h-screen text-zinc-50 font-sans selection:bg-white selection:text-zinc-950 pb-safe">
          <TopNav />
          
          <main className="max-w-3xl mx-auto w-full md:pt-16">
            {view === 'home' && <HomeView />}
            {view === 'shop' && <ShopView />}
            {view === 'product' && <ProductDetailView />}
            {view === 'cart' && <CartView />}
            {view === 'checkout' && <CheckoutView />}
            {view === 'orderSuccess' && <OrderSuccessView />}
            {view === 'profile' && <ProfileView />}
          </main>

          {/* Hide bottom nav on specific views like checkout/success */}
          {!['checkout', 'orderSuccess', 'product'].includes(view) && <BottomNav />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
